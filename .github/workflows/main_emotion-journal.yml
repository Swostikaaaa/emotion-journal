# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - emotion-journal

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CI: false                     # <-- Now correctly placed globally

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4          # <-- Updated to v4
        with:
          node-version: '22.x'

      - name: npm install, build, and prepare standalone
        run: |
          npm ci                           # <-- Faster, cleaner than npm install
          npm run build --if-present       # <-- Won't fail if build script missing
          # Copy static files and public folder into standalone output
          mkdir -p .next/standalone/.next/static
          cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
          cp -r public .next/standalone/public 2>/dev/null || true

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3B52743E46DE40C7966F6BB150C6A0C7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F9195B4544F44F9BB41D4ED647E754E6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AE4E228B013148938666ABD14E70931C }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'emotion-journal'
          slot-name: 'Production'
          package: .